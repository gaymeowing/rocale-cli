name: CI

on:
  pull_request_target:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  test:
    environment: ${{ github.event_name == 'pull_request_target' && 'CI' || null }}
    name: Test - ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 1
    strategy:
      max-parallel: 1
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Get foreman and run foreman install
        uses: Roblox/setup-foreman@v3
        with:
          version: "^1.0.0"
          token: ${{ secrets.GITHUB_TOKEN }}
          allow-external-github-orgs: true

      - name: Run tests
        env:
          LOG_NO_COLOR: 1
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          TEST_UNIVERSE_ID: ${{ secrets.TEST_UNIVERSE_ID }}
          TEST_PLACE_ID: ${{ secrets.TEST_PLACE_ID }}
        run: |
          lute setup
          lute scripts/build
          lute scripts/test
